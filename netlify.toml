[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.12.2"

[dev]
  command = "npm run dev"
  targetPort = 4321
  port = 8888
  autoLaunch = false

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[build.processing.html]
  pretty_urls = false

# ─────────────────────────────────────────────────────────────
# Redirect outdated CLP routes → current site routes
# ─────────────────────────────────────────────────────────────

# Legacy English-prefixed URLs → root canonical URLs
[[redirects]]
  from = "/en"
  to   = "/"
  status = 301
  
# Specific legacy English slug should win before the generic /en/* rule
